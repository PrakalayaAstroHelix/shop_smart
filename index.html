<!DOCTYPE html>
<html>

<head>
    <title>ShopSmart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🛒 ShopSmart</h1>

        <p>Compare prices across multiple platforms</p>

        <div class="controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search products">

            <select id="categorySelect">

            </select>

            <button onclick="searchProducts()">
                Search
            </button>

        </div>

        <h2>🔥 Trending Products</h2>

        <div id="trendingProducts"></div>

        <h2>❤️ Wishlist</h2>
        
        <div id="wishlistProducts"></div>

        <h2>🕒 Recently Viewed</h2>
        
        <div id="recentProducts"></div>

        <hr>

        <h2>Search Results</h2>

        <div id="results">

        </div>

        <!-- Product Details Modal -->

        <div id="productModal" class="modal">
            
            <div class="modal-content">
                
                <span class="close-btn"
                onclick="closeModal()">
                &times;
            </span>
            
            <div id="modalBody">

            </div>
        </div>
    </div>

    <h2>🔍 Search History</h2>
    
    <ul id="searchHistory"></ul>

    </div>

    <script src="data/beauty.js"></script>
    <script src="data/electronics.js"></script>
    <script src="data/fashion.js"></script>
    <script src="data/groceries.js"></script>
    <script src="data/food.js"></script>
    <script src="data/books.js"></script>
    <script src="data/toys.js"></script>
    <script src="data/products.js"></script>

    <script src="script.js"></script>

</body>

</html>
