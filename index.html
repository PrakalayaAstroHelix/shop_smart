<!DOCTYPE html>
<html>

<head>
    <title>ShopSmart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebar" class="sidebar">

    <span
        class="close-sidebar"
        onclick="closeSidebar()">

        ×

    </span>

    <h2>Menu</h2>

    <button onclick="showWishlistPage()">
        ❤️ Wishlist
    </button>

    <button onclick="showRecentPage()">
        🕒 Recently Viewed
    </button>

    <button onclick="showHistoryPage()">
        🔍 Search History
    </button>

    <button onclick="showProfile()">
        👤 Profile
    </button>

    <button onclick="showHomePage()">
        🏠 Home
    </button>

</div>

    <div class="container">

        <div class="header">
            
            <button
            class="menu-btn"
            onclick="openSidebar()">

            ☰
        
        </button>

        <h1>🛒 ShopSmart</h1>
        
        <button id="themeToggle">
            
            🌙
        
        </button>

        <button onclick="showLogin()">
            👤 Login
        </button>
    
    </div>

        <p>Compare prices across multiple platforms</p>

        <div class="controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search products">

            <select id="categorySelect">

            </select>

            <button onclick="searchProducts()">
                Search
            </button>

        </div>

        <div id="homePage">
            
            <h2>🔥 Trending Products</h2>
            
            <div id="trendingProducts"></div>
        
        </div>
        
        <div id="menuPage" style="display:none;"></div>
        

        <!-- Product Details Modal -->

        <div id="productModal" class="modal">
            
            <div class="modal-content">
                
                <span class="close-btn"
                onclick="closeModal()">
                &times;
            </span>
            
            <div id="modalBody">

            </div>
        </div>

    </div>


    <script src="data/beauty.js"></script>
    <script src="data/electronics.js"></script>
    <script src="data/fashion.js"></script>
    <script src="data/groceries.js"></script>
    <script src="data/food.js"></script>
    <script src="data/books.js"></script>
    <script src="data/toys.js"></script>
    <script src="data/products.js"></script>

    <script src="script.js"></script>

</body>

</html>
